<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A cat-themed chat application with real-time messaging">
    <title>Meow Chat - Cat Themed Chat Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-content">
                <h1 class="app-title">🐱 Meow Chat</h1>
                <p class="app-subtitle">Purrfect conversations with your feline friends</p>
            </div>
        </header>

        <!-- Main Chat Window -->
        <main class="chat-main">
            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="loading-indicator" id="loadingIndicator" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading messages...</p>
                </div>
            </div>

            <!-- Typing Indicator (shown when message is being sent) -->
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <p>Someone is typing...</p>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="chat-footer">
            <div class="name-input-section">
                <input 
                    type="text" 
                    id="userNameInput" 
                    class="name-input" 
                    placeholder="Your name..."
                    aria-label="Enter your name"
                    maxlength="20"
                >
                <span class="name-display" id="nameDisplay">You</span>
            </div>
            <form class="message-input-form" id="messageForm">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="Type your message here... 💬"
                        aria-label="Chat message input"
                        required
                    >
                    <button 
                        type="submit" 
                        class="send-button" 
                        aria-label="Send message"
                        title="Send (press Enter)"
                    >
                        <span class="paw-icon">🐾</span>
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <!-- Script -->
    <script src="./script.js"></script>
</body>
</html>
